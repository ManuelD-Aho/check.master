openapi: 3.0.3
info:
  title: CheckMaster API
  description: Academic thesis management system for UFR MI
  version: 1.0.0
  contact:
    name: CheckMaster Team
    email: support@checkmaster.example.com

servers:
  - url: https://checkmaster.example.com/api
    description: Production server
  - url: http://localhost:8000/api
    description: Development server

security:
  - sessionAuth: []

paths:
  /auth/login:
    post:
      summary: User authentication
      tags: [Authentication]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  token:
                    type: string
                  user:
                    $ref: '#/components/schemas/User'

  /auth/logout:
    post:
      summary: User logout
      tags: [Authentication]
      responses:
        '200':
          description: Logout successful

  /scolarite/{hash}/candidatures:
    get:
      summary: List candidatures for scolarité validation
      tags: [Scolarité]
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
            description: Hashids encoded traitement/action/entite IDs
      responses:
        '200':
          description: List of candidatures
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Candidature'

  /scolarite/{hash}/validate:
    post:
      summary: Validate a candidature (scolarité step)
      tags: [Scolarité]
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                commentaire:
                  type: string
      responses:
        '200':
          description: Candidature validated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /commission/{hash}/sessions:
    get:
      summary: List commission sessions
      tags: [Commission]
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'

  /commission/{hash}/vote:
    post:
      summary: Submit a vote for a rapport
      tags: [Commission]
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [valider, a_revoir, rejeter]
                commentaire:
                  type: string
      responses:
        '200':
          description: Vote submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /etudiant/{hash}/rapport:
    get:
      summary: Get student's rapport
      tags: [Étudiant]
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rapport data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rapport'

    post:
      summary: Submit or update rapport
      tags: [Étudiant]
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                contenu_html:
                  type: string
                  format: html
                titre:
                  type: string
      responses:
        '200':
          description: Rapport saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          description: Hashids encoded user ID
        nom:
          type: string
        email:
          type: string
        groupe:
          type: string
        permissions:
          type: array
          items:
            type: string

    Candidature:
      type: object
      properties:
        id:
          type: string
        etudiant:
          $ref: '#/components/schemas/Etudiant'
        theme:
          type: string
        entreprise:
          type: string
        etat:
          type: string
        date_soumission:
          type: string
          format: date-time

    Etudiant:
      type: object
      properties:
        id:
          type: string
        num_etu:
          type: string
        nom:
          type: string
        prenom:
          type: string
        email:
          type: string

    Session:
      type: object
      properties:
        id:
          type: string
        date:
          type: string
          format: date-time
        lieu:
          type: string
        rapports_count:
          type: integer
        statut:
          type: string
          enum: [planifiee, en_cours, terminee]

    Rapport:
      type: object
      properties:
        id:
          type: string
        titre:
          type: string
        contenu_html:
          type: string
        version:
          type: integer
        etat:
          type: string
        date_depot:
          type: string
          format: date-time

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        error:
          type: boolean
        message:
          type: string
        code:
          type: integer
        details:
          type: object

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: PHPSESSID

tags:
  - name: Authentication
    description: Login/logout operations
  - name: Scolarité
    description: Student records and candidature validation
  - name: Commission
    description: Report evaluation and voting
  - name: Étudiant
    description: Student operations (report writing, candidature)
  - name: Enseignant
    description: Teacher operations (supervision, jury)
  - name: Documents
    description: PDF generation and download
